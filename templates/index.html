
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo APP</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#f5f5f3; --surface:#fff; --border:rgba(0,0,0,0.08); --border-md:rgba(0,0,0,0.14);
      --text-1:#1a1917; --text-2:#6b6b67; --text-3:#a8a8a4;
      --accent:#5b5bd6; --accent-bg:#eeeeff; --accent-tx:#3730a3;
      --success-bg:#dcfce7; --success-tx:#166534;
      --warn-bg:#fef9c3; --warn-tx:#854d0e;
      --danger-bg:#fee2e2; --danger-tx:#991b1b;
      --radius:10px; --radius-lg:14px;
    }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text-1); min-height:100vh; padding:48px 16px 80px; font-size:14px; line-height:1.6; }
    .wrap { max-width:680px; margin:0 auto; }

    /* topbar */
    .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:36px; }
    .topbar h1 { font-size:22px; font-weight:600; letter-spacing:-0.3px; }
    .topbar p  { font-size:13px; color:var(--text-2); margin-top:2px; }
    .topbar-icon { width:40px; height:40px; background:var(--accent-bg); border-radius:10px; display:flex; align-items:center; justify-content:center; color:var(--accent-tx); font-size:20px; font-weight:700; }

    /* stats */
    .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:24px; }
    .stat { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius); padding:14px 16px; }
    .stat-num { font-size:26px; font-weight:600; letter-spacing:-0.5px; line-height:1.1; }
    .stat-label { font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:0.6px; color:var(--text-3); margin-top:4px; }
    .stat.s-total .stat-num { color:var(--accent); }
    .stat.s-pend  .stat-num { color:#d97706; }
    .stat.s-done  .stat-num { color:#16a34a; }

    /* card / form */
    .card { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:20px; margin-bottom:16px; }
    .card-title { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.7px; color:var(--text-3); margin-bottom:14px; }
    .form-fields { display:flex; flex-direction:column; gap:10px; }
    .field-wrap { display:flex; flex-direction:column; }
    .field-label { font-size:12px; font-weight:500; color:var(--text-2); margin-bottom:5px; }
    .required-star { color:#ef4444; margin-left:2px; }

    input[type=text], textarea {
      width:100%; padding:10px 13px; border:0.5px solid var(--border-md); border-radius:var(--radius);
      font:inherit; font-size:14px; color:var(--text-1); background:#fafaf9; outline:none;
      transition:border-color .15s, box-shadow .15s;
    }
    input[type=text]:focus, textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(91,91,214,.12); background:#fff; }
    input[type=text]::placeholder, textarea::placeholder { color:var(--text-3); }
    textarea { resize:vertical; min-height:76px; line-height:1.5; }
    .invalid { border-color:#ef4444 !important; box-shadow:0 0 0 3px rgba(239,68,68,.12) !important; }

    .field-err { font-size:12px; color:var(--danger-tx); display:none; align-items:center; gap:6px; background:var(--danger-bg); padding:8px 12px; border-radius:8px; margin-bottom:2px; }
    .field-err.show { display:flex; }
    .char-row { display:flex; justify-content:flex-end; font-size:11px; color:var(--text-3); margin-top:2px; }
    .char-row.warn { color:#d97706; }
    .char-row.over { color:var(--danger-tx); }

    .btn-add { display:flex; align-items:center; justify-content:center; gap:6px; padding:11px 16px; background:var(--accent); color:#fff; border:none; border-radius:var(--radius); font:inherit; font-size:14px; font-weight:500; cursor:pointer; transition:opacity .15s, transform .1s; }
    .btn-add:hover  { opacity:.88; }
    .btn-add:active { transform:scale(.97); }
    .btn-add:disabled { opacity:.45; cursor:not-allowed; transform:none; }

    /* list header */
    .list-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .list-head-toggle { display:flex; align-items:center; gap:8px; background:none; border:none; cursor:pointer; padding:0; font:inherit; }
    .list-head-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.7px; color:var(--text-3); }
    .chevron { font-size:11px; color:var(--text-3); transition:transform .2s; display:inline-block; }
    .chevron.open { transform:rotate(180deg); }
    .count-pill { font-size:11px; font-weight:600; background:var(--accent-bg); color:var(--accent-tx); padding:2px 10px; border-radius:99px; }

    /* bulk bar */
    .bulk-bar { display:none; align-items:center; justify-content:space-between; background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius); padding:10px 14px; margin-bottom:10px; gap:10px; }
    .bulk-bar.visible { display:flex; }
    .bulk-left { display:flex; align-items:center; gap:10px; }
    .bulk-check { width:18px; height:18px; border:1.5px solid var(--border-md); border-radius:5px; background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:11px; color:transparent; transition:all .15s; padding:0; flex-shrink:0; }
    .bulk-check.all-selected { background:var(--accent); border-color:var(--accent); color:#fff; }
    .bulk-check.partial      { background:var(--accent-bg); border-color:var(--accent); color:var(--accent); }
    .bulk-label { font-size:13px; color:var(--text-2); }
    .bulk-right { display:flex; gap:8px; }
    .btn-bulk { display:flex; align-items:center; gap:5px; padding:6px 12px; border-radius:8px; border:0.5px solid var(--border-md); font:inherit; font-size:12px; font-weight:500; background:var(--surface); color:var(--text-1); cursor:pointer; transition:all .15s; }
    .btn-bulk:hover { background:var(--bg); }
    .btn-bulk.danger:hover { background:var(--danger-bg); border-color:rgba(153,27,27,.15); color:var(--danger-tx); }

    /* filters */
    .filters { display:flex; gap:4px; margin-bottom:12px; }
    .filter-btn { padding:5px 12px; border:0.5px solid var(--border-md); border-radius:99px; font:inherit; font-size:12px; font-weight:500; color:var(--text-2); background:var(--surface); cursor:pointer; transition:all .15s; }
    .filter-btn:hover  { border-color:var(--accent); color:var(--accent); }
    .filter-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }

    /* todo item */
    .todo { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:14px 16px; margin-bottom:4px; display:flex; align-items:center; gap:10px; transition:border-color .15s, box-shadow .15s; }
    .todo:hover { border-color:var(--border-md); box-shadow:0 2px 8px rgba(0,0,0,.06); }
    .todo.selected { border-color:var(--accent); background:#f8f8ff; }
    .todo.has-detail-open { border-radius:var(--radius-lg) var(--radius-lg) 0 0; border-bottom-color:transparent; }

    .row-check { width:18px; height:18px; border:1.5px solid var(--border-md); border-radius:5px; background:transparent; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:11px; color:transparent; transition:all .15s; padding:0; }
    .row-check:hover { border-color:var(--accent); }
    .todo.selected .row-check { background:var(--accent); border-color:var(--accent); color:#fff; }

    .check-btn { width:22px; height:22px; border-radius:50%; border:1.5px solid var(--border-md); background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:12px; color:transparent; transition:all .15s; padding:0; flex-shrink:0; }
    .check-btn:hover { border-color:#16a34a; background:var(--success-bg); color:#16a34a; }
    .todo.done .check-btn { background:#16a34a; border-color:#16a34a; color:#fff; }

    .todo-main { flex:1; min-width:0; }
    .todo-title { font-size:14px; font-weight:500; color:var(--text-1); word-break:break-word; margin-bottom:4px; }
    .todo.done .todo-title { text-decoration:line-through; color:var(--text-3); }
    .todo-meta { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .badge { font-size:11px; font-weight:600; padding:2px 9px; border-radius:99px; text-transform:uppercase; letter-spacing:0.4px; }
    .badge-pend { background:var(--warn-bg);    color:var(--warn-tx); }
    .badge-done { background:var(--success-bg); color:var(--success-tx); }
    .todo-date { font-size:11px; color:var(--text-3); }

    .todo-right { display:flex; align-items:center; gap:4px; flex-shrink:0; }
    .expand-btn { width:28px; height:28px; border-radius:7px; border:0.5px solid var(--border-md); background:var(--bg); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:700; color:var(--text-2); transition:all .15s; padding:0; }
    .expand-btn:hover { background:var(--accent-bg); color:var(--accent); border-color:var(--accent); }
    .del-btn { width:28px; height:28px; border-radius:7px; border:0.5px solid transparent; background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:15px; color:var(--text-3); transition:all .15s; padding:0; }
    .del-btn:hover { background:var(--danger-bg); color:var(--danger-tx); border-color:rgba(153,27,27,.12); }

    /* detail panel */
    .detail-panel { background:#fafaf9; border:0.5px solid var(--border); border-top:none; border-radius:0 0 var(--radius-lg) var(--radius-lg); overflow:hidden; max-height:0; transition:max-height .28s ease, padding .28s ease; margin-bottom:8px; padding:0 18px; }
    .detail-panel.open { max-height:500px; padding:16px 18px 20px; }
    .detail-lbl { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.7px; color:var(--text-3); margin-bottom:4px; }
    .detail-val { font-size:13px; color:var(--text-2); line-height:1.6; }
    .detail-val.no-desc { color:var(--text-3); font-style:italic; }
    .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:14px; }
    .detail-actions { display:flex; align-items:center; gap:8px; margin-top:14px; flex-wrap:wrap; }
    .detail-btn { padding:6px 14px; border-radius:8px; border:0.5px solid var(--border-md); font:inherit; font-size:12px; font-weight:500; background:var(--surface); color:var(--text-1); cursor:pointer; transition:all .15s; }
    .detail-btn:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
    .detail-btn.danger:hover { background:var(--danger-bg); color:var(--danger-tx); border-color:rgba(153,27,27,.15); }

    /* collapsed */
    #list-body.collapsed { display:none; }

    /* empty */
    .empty { text-align:center; padding:48px 24px; background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius-lg); }
    .empty-icon { width:48px; height:48px; background:var(--accent-bg); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; color:var(--accent-tx); margin:0 auto 14px; }
    .empty h3 { font-size:15px; font-weight:500; margin-bottom:5px; }
    .empty p  { font-size:13px; color:var(--text-2); }

    /* modal */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:200; align-items:center; justify-content:center; }
    .modal-overlay.show { display:flex; }
    .modal { background:var(--surface); border-radius:var(--radius-lg); padding:24px; width:340px; max-width:90vw; box-shadow:0 8px 32px rgba(0,0,0,.14); }
    .modal h3 { font-size:16px; font-weight:600; margin-bottom:8px; }
    .modal p  { font-size:13px; color:var(--text-2); margin-bottom:20px; }
    .modal-btns { display:flex; gap:8px; justify-content:flex-end; }
    .btn-cancel { padding:8px 16px; border-radius:8px; border:0.5px solid var(--border-md); background:var(--surface); font:inherit; font-size:13px; cursor:pointer; color:var(--text-1); }
    .btn-cancel:hover { background:var(--bg); }
    .btn-del-confirm { padding:8px 16px; border-radius:8px; border:none; background:#ef4444; color:#fff; font:inherit; font-size:13px; font-weight:500; cursor:pointer; }
    .btn-del-confirm:hover { opacity:.88; }

    /* toast */
    #toast { position:fixed; bottom:28px; right:28px; background:var(--text-1); color:#fff; font-size:13px; padding:11px 18px; border-radius:var(--radius); opacity:0; transform:translateY(6px); transition:opacity .22s, transform .22s; pointer-events:none; z-index:300; max-width:300px; }
    #toast.show { opacity:1; transform:translateY(0); }

    /* spinner */
    .loading { text-align:center; padding:40px; color:var(--text-3); font-size:13px; }
    .spinner { width:20px; height:20px; border:2px solid var(--border-md); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 12px; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div><h1>My tasks</h1><p>Stay organised, one task at a time.</p></div>
    <div class="topbar-icon">&#10003;</div>
  </div>

  <div class="stats">
    <div class="stat s-total"><div class="stat-num" id="s-total">0</div><div class="stat-label">Total</div></div>
    <div class="stat s-pend"> <div class="stat-num" id="s-pend">0</div> <div class="stat-label">Pending</div></div>
    <div class="stat s-done"> <div class="stat-num" id="s-done">0</div> <div class="stat-label">Completed</div></div>
  </div>

  <div class="card">
    <div class="card-title">New task</div>
    <div class="form-fields">
      <div class="field-err" id="err-title"><span id="err-title-msg"></span></div>
      <div class="field-wrap">
        <label class="field-label" for="f-title">Title <span class="required-star">*</span></label>
        <input type="text" id="f-title" placeholder="What needs to be done?" maxlength="200" autocomplete="off"
          oninput="onTitleInput()" onkeydown="if(event.key==='Enter')document.getElementById('f-desc').focus()"/>
        <div class="char-row" id="title-chars">0 / 200</div>
      </div>
      <div class="field-err" id="err-desc"><span id="err-desc-msg"></span></div>
      <div class="field-wrap">
        <label class="field-label" for="f-desc">Description <span class="required-star">*</span></label>
        <textarea id="f-desc" placeholder="Describe the task in detail..." maxlength="500" rows="3"
          oninput="onDescInput()"></textarea>
        <div class="char-row" id="desc-chars">0 / 500</div>
      </div>
      <button class="btn-add" id="btn-add" onclick="addTodo()">+ Add task</button>
    </div>
  </div>

  <div class="list-head">
    <button class="list-head-toggle" onclick="toggleList()" id="list-toggle" aria-expanded="true">
      <span class="list-head-label">All tasks</span>
      <span class="chevron open" id="chevron">&#9660;</span>
    </button>
    <span class="count-pill" id="count-pill">0</span>
  </div>

  <div id="list-body">
    <div class="bulk-bar" id="bulk-bar">
      <div class="bulk-left">
        <button class="bulk-check" id="select-all-btn" onclick="toggleSelectAll()">&#10003;</button>
        <span class="bulk-label" id="bulk-label">Select all</span>
      </div>
      <div class="bulk-right">
        <button class="btn-bulk danger" id="delete-sel-btn" onclick="doDeleteSelected()" style="display:none">
          &#128465; Delete selected
        </button>
        <button class="btn-bulk danger" onclick="doDeleteAll()">
          &#128465; Delete all
        </button>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('pending',this)">Pending</button>
      <button class="filter-btn" onclick="setFilter('completed',this)">Completed</button>
    </div>

    <div id="todo-list">
      <div class="loading"><div class="spinner"></div>Loading tasks&hellip;</div>
    </div>
  </div>
</div>

<!-- modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Confirm deletion</h3>
    <p  id="modal-msg">This cannot be undone.</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-del-confirm" id="modal-ok">Delete</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
var allTodos     = [];
var activeFilter = 'all';
var selectedIds  = [];
var listOpen     = true;
var openDetailId = null;

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('en-IN',{
    day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'
  });
}

/* Use == not === so "3" == 3 */
function isSelected(id) {
  for (var i = 0; i < selectedIds.length; i++) {
    if (selectedIds[i] == id) return true;
  }
  return false;
}

function addSel(id)    { if (!isSelected(id)) selectedIds.push(Number(id)); }
function removeSel(id) { selectedIds = selectedIds.filter(function(x){ return x != id; }); }

function findById(id) {
  for (var i = 0; i < allTodos.length; i++) {
    if (allTodos[i].id == id) return allTodos[i];
  }
  return null;
}

/* ═══════════════════════════════════════════
   LOAD
═══════════════════════════════════════════ */
function loadTodos() {
  fetch('/todos')
    .then(function(r){ if(!r.ok) throw new Error(); return r.json(); })
    .then(function(data){
      allTodos = data;
      /* prune selections that no longer exist */
      selectedIds = selectedIds.filter(function(id){ return !!findById(id); });
      render();
    })
    .catch(function(){
      document.getElementById('todo-list').innerHTML =
        '<div class="empty"><div class="empty-icon">!</div>' +
        '<h3>Could not load tasks</h3><p>Make sure the Flask server is running.</p></div>';
    });
}

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
function render() {
  var filtered = allTodos.filter(function(t){
    if (activeFilter === 'pending')   return t.status === 'Pending';
    if (activeFilter === 'completed') return t.status === 'Completed';
    return true;
  });

  var total = allTodos.length;
  var done  = allTodos.filter(function(t){ return t.status === 'Completed'; }).length;
  document.getElementById('s-total').textContent    = total;
  document.getElementById('s-pend').textContent     = total - done;
  document.getElementById('s-done').textContent     = done;
  document.getElementById('count-pill').textContent = filtered.length;

  /* bulk bar */
  if (allTodos.length > 0) document.getElementById('bulk-bar').classList.add('visible');
  else                      document.getElementById('bulk-bar').classList.remove('visible');

  var filtIds   = filtered.map(function(t){ return t.id; });
  var selInFilt = filtIds.filter(function(id){ return isSelected(id); });
  var selBtn    = document.getElementById('select-all-btn');
  selBtn.className = selInFilt.length === 0             ? 'bulk-check'
                   : selInFilt.length === filtIds.length ? 'bulk-check all-selected'
                   :                                       'bulk-check partial';

  var selCount = selectedIds.length;
  document.getElementById('bulk-label').textContent        = selCount > 0 ? selCount + ' selected' : 'Select all';
  document.getElementById('delete-sel-btn').style.display  = selCount > 0 ? 'flex' : 'none';

  /* list */
  var list = document.getElementById('todo-list');
  if (filtered.length === 0) {
    var m = { all:['No tasks yet','Add your first task above.'], pending:['All caught up','No pending tasks.'], completed:['Nothing completed yet','Mark a task done to see it here.'] }[activeFilter];
    list.innerHTML = '<div class="empty"><div class="empty-icon">&#9776;</div><h3>'+m[0]+'</h3><p>'+m[1]+'</p></div>';
    return;
  }

  var html = '';
  var reversed = filtered.slice().reverse();
  for (var i = 0; i < reversed.length; i++) {
    var t      = reversed[i];
    var id     = Number(t.id);          /* always a number */
    var isDone = t.status === 'Completed';
    var isSel  = isSelected(id);
    var isOpen = (openDetailId === id);

    /* ── row ── */
    html += '<div class="todo' + (isDone?' done':'') + (isSel?' selected':'') + (isOpen?' has-detail-open':'') + '" id="row-'+id+'">';
    html +=   '<button class="row-check" data-id="'+id+'" onclick="toggleSelect('+id+')">&#10003;</button>';
    html +=   '<button class="check-btn" data-id="'+id+'" onclick="toggleDone('+id+','+(isDone?1:0)+')" title="'+(isDone?'Mark pending':'Mark completed')+'">&#10003;</button>';
    html +=   '<div class="todo-main">';
    html +=     '<div class="todo-title">'+esc(t.title)+'</div>';
    html +=     '<div class="todo-meta">';
    html +=       '<span class="badge '+(isDone?'badge-done':'badge-pend')+'">'+t.status+'</span>';
    html +=       '<span class="todo-date">'+fmtDate(t.created_at)+'</span>';
    html +=     '</div>';
    html +=   '</div>';
    html +=   '<div class="todo-right">';
    html +=     '<button class="expand-btn" data-id="'+id+'" onclick="toggleDetail('+id+')" title="'+(isOpen?'Hide details':'View details')+'">'+(isOpen?'&#8964;':'&#8250;')+'</button>';
    html +=     '<button class="del-btn"    data-id="'+id+'" onclick="askDelete('+id+')"    title="Delete">&#128465;</button>';
    html +=   '</div>';
    html += '</div>';

    /* ── detail panel ── */
    html += '<div class="detail-panel'+(isOpen?' open':'') +'" id="detail-'+id+'">';
    html +=   '<div class="detail-lbl">Description</div>';
    html +=   '<div class="detail-val'+(t.description?'':' no-desc')+'">'+(t.description?esc(t.description):'No description added.')+'</div>';
    html +=   '<div class="detail-grid">';
    html +=     '<div><div class="detail-lbl">Created</div><div class="detail-val">'+fmtDate(t.created_at)+'</div></div>';
    html +=     '<div><div class="detail-lbl">Last updated</div><div class="detail-val">'+(t.updated_at&&t.updated_at!==t.created_at?fmtDate(t.updated_at):'—')+'</div></div>';
    html +=   '</div>';
    html +=   '<div class="detail-actions">';
    html +=     '<span class="badge '+(isDone?'badge-done':'badge-pend')+'">'+t.status+'</span>';
    if (isDone) {
      html += '<button class="detail-btn" onclick="toggleDone('+id+',1)">&#8617; Mark as Pending</button>';
    } else {
      html += '<button class="detail-btn" onclick="toggleDone('+id+',0)">&#10003; Mark as Completed</button>';
    }
    html +=     '<button class="detail-btn danger" onclick="askDelete('+id+')">&#128465; Delete</button>';
    html +=   '</div>';
    html += '</div>';
  }

  list.innerHTML = html;
}

/* ═══════════════════════════════════════════
   DETAIL TOGGLE
═══════════════════════════════════════════ */
function toggleDetail(id) {
  id = Number(id);
  openDetailId = (openDetailId === id) ? null : id;
  render();
}

/* ═══════════════════════════════════════════
   COLLAPSE LIST
═══════════════════════════════════════════ */
function toggleList() {
  listOpen = !listOpen;
  document.getElementById('list-body').classList.toggle('collapsed', !listOpen);
  var chev = document.getElementById('chevron');
  listOpen ? chev.classList.add('open') : chev.classList.remove('open');
  document.getElementById('list-toggle').setAttribute('aria-expanded', String(listOpen));
}

/* ═══════════════════════════════════════════
   FILTER
═══════════════════════════════════════════ */
function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  el.classList.add('active');
  selectedIds  = [];
  openDetailId = null;
  render();
}

/* ═══════════════════════════════════════════
   SELECTION
═══════════════════════════════════════════ */
function toggleSelect(id) {
  id = Number(id);
  if (isSelected(id)) removeSel(id);
  else                addSel(id);
  render();
}

function toggleSelectAll() {
  var filtered = allTodos.filter(function(t){
    if (activeFilter === 'pending')   return t.status === 'Pending';
    if (activeFilter === 'completed') return t.status === 'Completed';
    return true;
  });
  var ids    = filtered.map(function(t){ return Number(t.id); });
  var allSel = ids.every(function(id){ return isSelected(id); });
  if (allSel) ids.forEach(function(id){ removeSel(id); });
  else        ids.forEach(function(id){ addSel(id); });
  render();
}

/* ═══════════════════════════════════════════
   FORM VALIDATION
═══════════════════════════════════════════ */
function onTitleInput() {
  var val = document.getElementById('f-title').value;
  var el  = document.getElementById('title-chars');
  el.textContent = val.length + ' / 200';
  el.className   = 'char-row'+(val.length>180?(val.length>=200?' over':' warn'):'');
  if (val.trim()) { document.getElementById('err-title').classList.remove('show'); document.getElementById('f-title').classList.remove('invalid'); }
}

function onDescInput() {
  var val = document.getElementById('f-desc').value;
  var el  = document.getElementById('desc-chars');
  el.textContent = val.length + ' / 500';
  el.className   = 'char-row'+(val.length>450?(val.length>=500?' over':' warn'):'');
  if (val.trim()) { document.getElementById('err-desc').classList.remove('show'); document.getElementById('f-desc').classList.remove('invalid'); }
}

function showErr(errId, inputId, msg) {
  document.getElementById(errId+'-msg').textContent = msg;
  document.getElementById(errId).classList.add('show');
  document.getElementById(inputId).classList.add('invalid');
  document.getElementById(inputId).focus();
}

/* ═══════════════════════════════════════════
   ADD TODO
═══════════════════════════════════════════ */
function addTodo() {
  var title = document.getElementById('f-title').value.trim();
  var desc  = document.getElementById('f-desc').value.trim();

  document.getElementById('err-title').classList.remove('show');
  document.getElementById('err-desc').classList.remove('show');
  document.getElementById('f-title').classList.remove('invalid');
  document.getElementById('f-desc').classList.remove('invalid');

  if (!title)        { showErr('err-title','f-title','Title is required.'); return; }
  if (title.length<2){ showErr('err-title','f-title','Title must be at least 2 characters.'); return; }
  if (!desc)         { showErr('err-desc', 'f-desc', 'Description is required.'); return; }
  if (desc.length<3) { showErr('err-desc', 'f-desc', 'Description must be at least 3 characters.'); return; }

  var btn = document.getElementById('btn-add');
  btn.disabled = true; btn.textContent = 'Adding…';

  fetch('/todos', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ title:title, description:desc })
  })
  .then(function(r){ if(!r.ok) throw new Error(); return r.json(); })
  .then(function(){
    document.getElementById('f-title').value = '';
    document.getElementById('f-desc').value  = '';
    document.getElementById('title-chars').textContent = '0 / 200';
    document.getElementById('desc-chars').textContent  = '0 / 500';
    if (!listOpen) toggleList();
    showToast('Task added');
    loadTodos();
  })
  .catch(function(){ showToast('Failed to add task'); })
  .finally(function(){ btn.disabled=false; btn.textContent='+ Add task'; });
}

/* ═══════════════════════════════════════════
   TOGGLE DONE
═══════════════════════════════════════════ */
function toggleDone(id, wasDone) {
  id = Number(id);
  fetch('/todos/'+id, {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ status: wasDone ? 'Pending' : 'Completed' })
  })
  .then(function(r){ if(!r.ok) throw new Error(); return r.json(); })
  .then(function(){ showToast(wasDone?'Marked as pending':'Task completed'); loadTodos(); })
  .catch(function(){ showToast('Failed to update'); });
}

/* ═══════════════════════════════════════════
   DELETE  — all paths go through askDelete()
═══════════════════════════════════════════ */
function askDelete(id) {
  id = Number(id);
  var todo  = findById(id);
  var label = todo ? '"' + todo.title + '"' : 'this task';
  showModal(
    'Delete task',
    'Delete ' + label + '? This cannot be undone.',
    function() { execDelete([id]); }
  );
}

function doDeleteSelected() {
  if (selectedIds.length === 0) return;
  var ids   = selectedIds.slice();
  var count = ids.length;
  showModal(
    'Delete selected',
    'Delete ' + count + ' selected task' + (count > 1 ? 's' : '') + '? This cannot be undone.',
    function() { execDelete(ids); }
  );
}

function doDeleteAll() {
  if (allTodos.length === 0) return;
  var ids   = allTodos.map(function(t){ return Number(t.id); });
  var count = ids.length;
  showModal(
    'Delete all tasks',
    'Delete all ' + count + ' tasks? This cannot be undone.',
    function() { execDelete(ids); }
  );
}

function execDelete(ids) {
  /* ids is already an array of Numbers */
  var promises = ids.map(function(id){
    return fetch('/todos/' + id, { method:'DELETE' });
  });
  Promise.all(promises)
    .then(function(responses){
      var allOk = responses.every(function(r){ return r.ok; });
      if (!allOk) throw new Error('one or more deletes failed');
      selectedIds  = [];
      openDetailId = null;
      showToast(ids.length + ' task' + (ids.length>1?'s':'') + ' deleted');
      loadTodos();
    })
    .catch(function(){ showToast('Delete failed — check server'); });
}

/* ═══════════════════════════════════════════
   MODAL  — simple, self-contained
═══════════════════════════════════════════ */
function showModal(title, msg, onConfirm) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-msg').textContent   = msg;

  var okBtn = document.getElementById('modal-ok');
  /* Clone to remove any previous listener */
  var newOk = okBtn.cloneNode(true);
  okBtn.parentNode.replaceChild(newOk, okBtn);
  newOk.addEventListener('click', function() {
    closeModal();
    onConfirm();
  });

  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

document.getElementById('modal').addEventListener('click', function(e){
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', function(e){
  if (e.key === 'Escape') closeModal();
});

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
var toastTimer;
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 2800);
}

/* ── init ── */
loadTodos();
</script>
</body>
</html>
